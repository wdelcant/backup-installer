name: Release

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  semantic-release:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}
      new_release_tag: ${{ steps.semantic.outputs.new_release_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install semantic-release
        run: |
          npm install -g semantic-release @semantic-release/git @semantic-release/changelog @semantic-release/github

      - name: Create .releaserc
        run: |
          cat > .releaserc.json << 'EOF'
          {
            "branches": ["main", "master"],
            "plugins": [
              "@semantic-release/commit-analyzer",
              "@semantic-release/release-notes-generator",
              "@semantic-release/changelog",
              "@semantic-release/github",
              [
                "@semantic-release/git",
                {
                  "assets": ["CHANGELOG.md"],
                  "message": "chore(release): ${nextRelease.version} [skip ci]\n\n${nextRelease.notes}"
                }
              ]
            ]
          }
          EOF

      - name: Run semantic-release
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Run semantic-release and capture output
          OUTPUT=$(semantic-release --dry-run 2>&1 || true)
          echo "$OUTPUT"

          # Check if there will be a new release
          if echo "$OUTPUT" | grep -q "There are no relevant changes"; then
            echo "new_release_published=false" >> $GITHUB_OUTPUT
            echo "No hay cambios relevantes para un nuevo release"
          else
            # Extract version from output
            VERSION=$(echo "$OUTPUT" | grep -oP 'The next release version is \K[0-9]+\.[0-9]+\.[0-9]+' || echo "")
            if [ -n "$VERSION" ]; then
              echo "new_release_published=true" >> $GITHUB_OUTPUT
              echo "new_release_version=$VERSION" >> $GITHUB_OUTPUT
              echo "new_release_tag=v$VERSION" >> $GITHUB_OUTPUT
              echo "Nueva versión detectada: v$VERSION"
            else
              echo "new_release_published=false" >> $GITHUB_OUTPUT
            fi
          fi

          # Now run it for real
          semantic-release || true

  build:
    needs: semantic-release
    runs-on: ubuntu-latest
    if: needs.semantic-release.outputs.new_release_published == 'true' || startsWith(github.ref, 'refs/tags/v')
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            binary: backup-installer-linux-amd64
          - goos: linux
            goarch: arm64
            binary: backup-installer-linux-arm64
          - goos: darwin
            goarch: amd64
            binary: backup-installer-darwin-amd64
          - goos: darwin
            goarch: arm64
            binary: backup-installer-darwin-arm64
          - goos: windows
            goarch: amd64
            binary: backup-installer-windows-amd64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Get version
        id: get_version
        run: |
          if [ -n "${{ needs.semantic-release.outputs.new_release_version }}" ]; then
            VERSION="${{ needs.semantic-release.outputs.new_release_version }}"
          else
            VERSION=${GITHUB_REF#refs/tags/v}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -ldflags="-s -w -X main.Version=${{ steps.get_version.outputs.version }}" -o ${{ matrix.binary }} ./cmd/installer

      - name: Generate SHA256 checksum
        run: |
          sha256sum ${{ matrix.binary }} > ${{ matrix.binary }}.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: |
            ${{ matrix.binary }}
            ${{ matrix.binary }}.sha256

  release:
    needs: [semantic-release, build]
    runs-on: ubuntu-latest
    if: needs.semantic-release.outputs.new_release_published == 'true' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          pattern: backup-installer-*

      - name: Collect and organize artifacts
        run: |
          mkdir -p ./release
          find ./artifacts -type f -name "backup-installer-*" -exec cp {} ./release/ \;
          find ./release -name "*.sha256" -exec cat {} \; > ./release/checksums.txt
          rm -f ./release/*.sha256

      - name: Get version for release
        id: get_version
        run: |
          if [ -n "${{ needs.semantic-release.outputs.new_release_version }}" ]; then
            VERSION="${{ needs.semantic-release.outputs.new_release_version }}"
          else
            VERSION=${GITHUB_REF#refs/tags/v}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.get_version.outputs.version }}
          name: Release v${{ steps.get_version.outputs.version }}
          files: ./release/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
